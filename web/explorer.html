<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spoty Scanner — Explorador de datos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            spotify: "#1db954",
            surface: "#181818",
            surface2: "#282828",
          },
        },
      },
    };
  </script>
</head>
<body class="min-h-full bg-[#121212] text-white antialiased">

  <header class="border-b border-surface2 px-8 py-6">
    <h1 class="text-2xl font-bold text-spotify">Spoty Scanner</h1>
    <p class="mt-1 text-sm text-zinc-400">Explorador de búsquedas y datos del bot</p>
    <span id="cacheBadge" class="mt-2 inline-block rounded-full bg-spotify/15 px-3 py-1 text-xs text-spotify">
      Cargando caché…
    </span>
  </header>

  <div id="banner" class="mx-8 mt-4 hidden rounded-lg px-4 py-3 text-sm"></div>

  <div id="stats" class="grid grid-cols-2 gap-3 px-8 py-5 sm:grid-cols-3 lg:grid-cols-5">
    <div class="rounded-lg border border-surface2 bg-surface p-4">
      <div id="statSearches" class="text-3xl font-bold text-spotify">—</div>
      <div class="mt-1 text-xs uppercase tracking-wide text-zinc-500">Búsquedas</div>
    </div>
    <div class="rounded-lg border border-surface2 bg-surface p-4">
      <div id="statLibrary" class="text-3xl font-bold text-spotify">—</div>
      <div class="mt-1 text-xs uppercase tracking-wide text-zinc-500">Biblioteca</div>
    </div>
    <div class="rounded-lg border border-surface2 bg-surface p-4">
      <div id="statLikes" class="text-3xl font-bold text-spotify">—</div>
      <div class="mt-1 text-xs uppercase tracking-wide text-zinc-500">Likes</div>
    </div>
    <div class="rounded-lg border border-surface2 bg-surface p-4">
      <div id="statPlayed" class="text-3xl font-bold text-spotify">—</div>
      <div class="mt-1 text-xs uppercase tracking-wide text-zinc-500">Radio (IDs)</div>
    </div>
    <div class="rounded-lg border border-surface2 bg-surface p-4">
      <div id="statDisk" class="text-2xl font-bold text-spotify">—</div>
      <div class="mt-1 text-xs uppercase tracking-wide text-zinc-500">Disco (audio)</div>
      <div id="statDiskDetail" class="mt-1 text-xs text-zinc-600"></div>
    </div>
  </div>

  <div class="flex flex-wrap items-center gap-3 px-8 pb-4">
    <input
      type="search"
      id="searchInput"
      placeholder="Filtrar por título, búsqueda, artista…"
      autocomplete="off"
      class="min-w-[200px] flex-1 rounded-full border border-surface2 bg-surface px-4 py-2.5 text-sm text-white outline-none focus:border-spotify"
    >
    <select
      id="sortSelect"
      class="cursor-pointer rounded-full border border-surface2 bg-surface px-4 py-2.5 text-sm text-white outline-none"
    >
      <option value="recent">Más reciente</option>
      <option value="alpha">Alfabético</option>
      <option value="duration">Duración</option>
      <option value="plays">Más reproducidas</option>
      <option value="size">Mayor tamaño</option>
    </select>
    <div class="flex rounded-full border border-surface2 bg-surface p-1 text-sm">
      <button id="viewGrid" class="view-btn rounded-full bg-spotify px-4 py-1.5 font-semibold text-black">Tarjetas</button>
      <button id="viewTable" class="view-btn rounded-full px-4 py-1.5 font-semibold text-zinc-400 hover:text-white">Tabla</button>
    </div>
  </div>

  <nav class="flex gap-1 border-b border-surface2 px-8">
    <button class="tab border-b-2 border-spotify px-5 py-3 text-sm font-semibold text-spotify" data-tab="searches">Búsquedas</button>
    <button class="tab border-b-2 border-transparent px-5 py-3 text-sm font-semibold text-zinc-400 hover:text-white" data-tab="library">Biblioteca</button>
    <button class="tab border-b-2 border-transparent px-5 py-3 text-sm font-semibold text-zinc-400 hover:text-white" data-tab="likes">Likes</button>
  </nav>

  <main class="px-8 py-6 pb-12">
    <section id="panel-searches">
      <p id="countSearches" class="mb-4 text-sm text-zinc-500"></p>
      <div id="gridSearches" class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4"></div>
      <div id="tableSearches" class="hidden"></div>
    </section>
    <section id="panel-library" class="hidden">
      <div id="libraryToolbar" class="mb-4 flex flex-wrap items-center gap-3">
        <div id="dedupeBanner" class="hidden flex-1 rounded-lg border border-amber-500/30 bg-amber-500/10 px-4 py-2 text-sm text-amber-300"></div>
        <div id="libraryGroupToggle" class="hidden flex rounded-full border border-surface2 bg-surface p-1 text-sm">
          <button id="libGrouped" class="rounded-full bg-spotify px-3 py-1 font-semibold text-black">Agrupado</button>
          <button id="libDetailed" class="rounded-full px-3 py-1 font-semibold text-zinc-400 hover:text-white">Detallado</button>
        </div>
        <button id="dedupeBtn" class="hidden rounded-full bg-red-500/20 px-4 py-2 text-sm font-semibold text-red-400 hover:bg-red-500/30">
          Limpiar duplicados
        </button>
      </div>
      <p id="countLibrary" class="mb-4 text-sm text-zinc-500"></p>
      <div id="gridLibrary" class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4"></div>
      <div id="tableLibrary" class="hidden"></div>
    </section>
    <section id="panel-likes" class="hidden">
      <p id="countLikes" class="mb-4 text-sm text-zinc-500"></p>
      <div id="gridLikes" class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4"></div>
      <div id="tableLikes" class="hidden"></div>
    </section>
  </main>

  <script>
    const CACHE_DIRS = [".cache", "spotify_cache"];
    const TAB_ACTIVE = "border-b-2 border-spotify text-spotify";
    const TAB_INACTIVE = "border-b-2 border-transparent text-zinc-400 hover:text-white";
    const TH = "cursor-pointer select-none whitespace-nowrap px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-zinc-400 hover:text-white";
    const TD = "px-4 py-3 text-sm text-zinc-300";
    const TABLE_WRAP = "overflow-x-auto rounded-lg border border-surface2";

    let cacheDir = null;
    let activeTab = "searches";
    let viewMode = "grid";
    let tableSort = { column: "cached_at", dir: "desc" };
    let searches = [];
    let library = [];
    let likes = [];
    let playedCount = 0;
    let diskUsage = { total_bytes: 0, files: {}, tracks_on_disk: 0 };
    let dedupePreview = null;
    let libraryGrouped = true;

    const TABLE_COLUMNS = {
      searches: [
        { key: "query", label: "Búsqueda" },
        { key: "title", label: "Título" },
        { key: "uploader", label: "Canal" },
        { key: "duration", label: "Duración", numeric: true },
        { key: "cached_at", label: "Cacheado", numeric: true },
      ],
      library: [
        { key: "title", label: "Título" },
        { key: "artist", label: "Artista" },
        { key: "play_count", label: "Reproducciones", numeric: true },
        { key: "duration", label: "Duración", numeric: true },
        { key: "file_size_bytes", label: "Tamaño", numeric: true },
        { key: "on_disk", label: "En disco" },
        { key: "cached_at", label: "Cacheado", numeric: true },
      ],
      libraryGrouped: [
        { key: "title", label: "Título" },
        { key: "artist", label: "Artista" },
        { key: "play_count", label: "Reproducciones", numeric: true },
        { key: "duration", label: "Duración", numeric: true },
        { key: "file_size_bytes", label: "Tamaño", numeric: true },
        { key: "copies", label: "Copias", numeric: true },
        { key: "wasted_bytes", label: "Desperdicio", numeric: true },
        { key: "on_disk", label: "En disco" },
      ],
      likes: [
        { key: "title", label: "Título" },
        { key: "artist", label: "Artista" },
        { key: "yt_query", label: "Búsqueda" },
        { key: "liked_at", label: "Like", numeric: true },
      ],
    };

    const DEFAULT_TABLE_SORT = {
      searches: { column: "cached_at", dir: "desc" },
      library: { column: "file_size_bytes", dir: "desc" },
      likes: { column: "liked_at", dir: "desc" },
    };

    async function loadCacheJson(filename) {
      for (const dir of CACHE_DIRS) {
        try {
          const res = await fetch(`/${dir}/${filename}`);
          if (res.ok) {
            cacheDir = dir;
            return await res.json();
          }
        } catch (_) { /* try next dir */ }
      }
      return null;
    }

    async function loadDiskUsage() {
      try {
        const res = await fetch("/api/disk-usage");
        if (res.ok) return await res.json();
      } catch (_) { /* static-only fallback */ }
      return { total_bytes: 0, files: {}, tracks_on_disk: 0 };
    }

    async function loadDedupePreview() {
      try {
        const res = await fetch("/api/library/dedupe-preview");
        if (res.ok) {
          dedupePreview = await res.json();
          updateDedupeUi();
        }
      } catch (_) { /* API unavailable */ }
    }

    function groupLibraryItems(items) {
      const byVideo = new Map();
      const noVideo = [];

      for (const item of items) {
        if (!item.video_id) {
          noVideo.push({ ...item, copies: 1, wasted_bytes: 0 });
          continue;
        }
        const existing = byVideo.get(item.video_id);
        if (!existing) {
          byVideo.set(item.video_id, {
            ...item,
            copies: 1,
            wasted_bytes: 0,
            all_sizes: [item.file_size_bytes || 0],
          });
          continue;
        }
        existing.copies += 1;
        existing.play_count += item.play_count || 0;
        existing.request_count += item.request_count || 0;
        existing.all_sizes.push(item.file_size_bytes || 0);
        existing.cached_at = Math.max(existing.cached_at || 0, item.cached_at || 0);
        if ((item.file_size_bytes || 0) > (existing.file_size_bytes || 0)) {
          Object.assign(existing, {
            trackId: item.trackId,
            title: item.title,
            thumbnail: item.thumbnail,
            file_size_bytes: item.file_size_bytes,
            on_disk: item.on_disk,
            spotify_id: item.spotify_id || existing.spotify_id,
          });
        }
      }

      return [...byVideo.values(), ...noVideo].map((item) => {
        if (item.all_sizes) {
          const sizes = item.all_sizes.filter((s) => s > 0).sort((a, b) => b - a);
          item.file_size_bytes = sizes[0] || 0;
          item.wasted_bytes = sizes.length > 1 ? sizes.slice(1).reduce((a, b) => a + b, 0) : 0;
          delete item.all_sizes;
        }
        return item;
      });
    }

    function formatDuration(sec) {
      if (!sec || sec < 0) return "—";
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return `${m}:${String(s).padStart(2, "0")}`;
    }

    function formatBytes(bytes) {
      if (!bytes || bytes <= 0) return "—";
      const units = ["B", "KB", "MB", "GB"];
      let n = bytes;
      let i = 0;
      while (n >= 1024 && i < units.length - 1) {
        n /= 1024;
        i++;
      }
      return `${n.toFixed(i === 0 ? 0 : 1)} ${units[i]}`;
    }

    function formatTimestamp(unix) {
      if (!unix) return "—";
      return new Date(unix * 1000).toLocaleString("es", {
        day: "2-digit", month: "short", year: "numeric",
        hour: "2-digit", minute: "2-digit",
      });
    }

    function spotifyUrl(id) {
      return id ? `https://open.spotify.com/track/${id}` : null;
    }

    function youtubeUrl(entry) {
      if (entry.webpage_url) return entry.webpage_url;
      if (entry.video_id) return `https://www.youtube.com/watch?v=${entry.video_id}`;
      return null;
    }

    function escapeHtml(str) {
      const d = document.createElement("div");
      d.textContent = str ?? "";
      return d.innerHTML;
    }

    function thumbHtml(thumbnail, alt) {
      if (thumbnail) {
        return `<img src="${escapeHtml(thumbnail)}" alt="${escapeHtml(alt)}" loading="lazy" class="h-full w-full object-cover">`;
      }
      return `<span class="text-4xl text-zinc-600">♪</span>`;
    }

    function linkHtml(href, label) {
      if (!href) return "";
      return `<a href="${escapeHtml(href)}" target="_blank" rel="noopener" class="text-spotify hover:underline">${escapeHtml(label)}</a>`;
    }

    function emptyHtml(msg) {
      return `<div class="col-span-full py-12 text-center text-sm text-zinc-500">${escapeHtml(msg)}</div>`;
    }

    function loadingHtml() {
      return `<div class="col-span-full py-12 text-center text-sm text-zinc-500">
        <span class="mr-2 inline-block h-3.5 w-3.5 animate-spin rounded-full border-2 border-spotify border-t-transparent align-middle"></span>
        Cargando datos…
      </div>`;
    }

    const CARD = "overflow-hidden rounded-lg border border-surface2 bg-surface transition-colors hover:border-spotify";
    const THUMB = "flex aspect-video items-center justify-center overflow-hidden bg-surface2";
    const BODY = "p-3.5";
    const TITLE = "mb-1 line-clamp-2 text-sm font-semibold";
    const QUERY = "mb-2 line-clamp-1 text-xs italic text-spotify";
    const META = "text-xs text-zinc-500";

    function resolveFileSize(trackId, entry) {
      if (entry.file_size_bytes > 0) return entry.file_size_bytes;
      return diskUsage.files[trackId] || 0;
    }

    function transformSearches(raw) {
      if (!raw || typeof raw !== "object") return [];
      return Object.entries(raw).map(([query, meta]) => ({
        query,
        title: meta.title || query,
        thumbnail: meta.thumbnail,
        duration: meta.duration || 0,
        uploader: meta.uploader || "—",
        webpage_url: meta.webpage_url,
        video_id: meta.video_id,
        cached_at: meta.cached_at || 0,
      }));
    }

    function transformLibrary(raw) {
      if (!raw || typeof raw !== "object") return [];
      return Object.entries(raw).map(([trackId, entry]) => {
        const fileSize = resolveFileSize(trackId, entry);
        const onDisk = fileSize > 0 || !!diskUsage.files[trackId];
        return {
          trackId,
          title: entry.title || trackId,
          artist: entry.artist || "—",
          thumbnail: entry.thumbnail,
          yt_query: entry.yt_query,
          spotify_id: entry.spotify_id,
          video_id: entry.video_id,
          webpage_url: entry.webpage_url,
          duration: entry.duration || 0,
          play_count: entry.play_count || 0,
          request_count: entry.request_count || 0,
          last_played: entry.last_played || 0,
          cached_at: entry.cached_at || 0,
          file_path: entry.file_path,
          file_size_bytes: fileSize,
          on_disk: onDisk,
        };
      });
    }

    function transformLikes(raw) {
      if (!raw || typeof raw !== "object") return [];
      const flat = [];
      for (const [guildId, users] of Object.entries(raw)) {
        if (!users || typeof users !== "object") continue;
        for (const [userId, tracks] of Object.entries(users)) {
          if (!Array.isArray(tracks)) continue;
          for (const t of tracks) {
            flat.push({
              guildId,
              userId,
              track_id: t.track_id,
              title: t.title || "—",
              artist: t.artist || "—",
              yt_query: t.yt_query || "—",
              spotify_id: t.spotify_id,
              thumbnail: t.thumbnail,
              liked_at: t.liked_at || 0,
            });
          }
        }
      }
      return flat;
    }

    function countPlayedIds(raw) {
      if (!raw || typeof raw !== "object") return 0;
      let total = 0;
      for (const ids of Object.values(raw)) {
        if (Array.isArray(ids)) total += ids.length;
      }
      return total;
    }

    function getFilterText() {
      return document.getElementById("searchInput").value.trim().toLowerCase();
    }

    function matchesFilter(item, fields) {
      const q = getFilterText();
      if (!q) return true;
      return fields.some((f) => String(f || "").toLowerCase().includes(q));
    }

    function getItemsForTab(tab) {
      if (tab === "searches") {
        return searches.filter((i) => matchesFilter(i, [i.query, i.title, i.uploader]));
      }
      if (tab === "library") {
        const filtered = library.filter((i) => matchesFilter(i, [i.title, i.artist, i.yt_query, i.trackId]));
        if (libraryGrouped && viewMode === "table") return groupLibraryItems(filtered);
        return filtered;
      }
      return likes.filter((i) => matchesFilter(i, [i.title, i.artist, i.yt_query]));
    }

    function sortByDropdown(items, tab) {
      const key = document.getElementById("sortSelect").value;
      const sorted = [...items];
      if (tab === "searches") {
        if (key === "alpha") sorted.sort((a, b) => a.title.localeCompare(b.title));
        else if (key === "duration") sorted.sort((a, b) => b.duration - a.duration);
        else sorted.sort((a, b) => b.cached_at - a.cached_at);
      } else if (tab === "library") {
        if (key === "alpha") sorted.sort((a, b) => a.title.localeCompare(b.title));
        else if (key === "duration") sorted.sort((a, b) => b.duration - a.duration);
        else if (key === "size") sorted.sort((a, b) => b.file_size_bytes - a.file_size_bytes);
        else sorted.sort((a, b) => b.play_count - a.play_count);
      } else if (tab === "likes") {
        if (key === "alpha") sorted.sort((a, b) => a.title.localeCompare(b.title));
        else sorted.sort((a, b) => b.liked_at - a.liked_at);
      }
      return sorted;
    }

    function sortByTable(items) {
      const { column, dir } = tableSort;
      const sorted = [...items];
      const mul = dir === "asc" ? 1 : -1;
      sorted.sort((a, b) => {
        let av = a[column];
        let bv = b[column];
        if (typeof av === "boolean") av = av ? 1 : 0;
        if (typeof bv === "boolean") bv = bv ? 1 : 0;
        if (typeof av === "number" && typeof bv === "number") return (av - bv) * mul;
        return String(av || "").localeCompare(String(bv || ""), "es") * mul;
      });
      return sorted;
    }

    function sortIndicator(column) {
      if (tableSort.column !== column) return `<span class="text-zinc-600">↕</span>`;
      return tableSort.dir === "asc"
        ? `<span class="text-spotify">↑</span>`
        : `<span class="text-spotify">↓</span>`;
    }

    function renderSearchCard(item) {
      const yt = youtubeUrl(item);
      return `
        <article class="${CARD}">
          <div class="${THUMB}">${thumbHtml(item.thumbnail, item.title)}</div>
          <div class="${BODY}">
            <div class="${TITLE}">${escapeHtml(item.title)}</div>
            <div class="${QUERY}">"${escapeHtml(item.query)}"</div>
            <div class="${META}">${escapeHtml(item.uploader)} · ${formatDuration(item.duration)}</div>
            <div class="${META}">Cacheado: ${formatTimestamp(item.cached_at)}</div>
            <div class="mt-2.5 flex flex-wrap gap-2">${linkHtml(yt, "YouTube")}</div>
          </div>
        </article>`;
    }

    function renderLibraryCard(item) {
      const yt = youtubeUrl(item);
      const sp = spotifyUrl(item.spotify_id);
      return `
        <article class="${CARD}">
          <div class="${THUMB}">${thumbHtml(item.thumbnail, item.title)}</div>
          <div class="${BODY}">
            <div class="${TITLE}">${escapeHtml(item.title)}</div>
            <div class="${META}">${escapeHtml(item.artist)}</div>
            <div class="mt-2 flex flex-wrap gap-2">
              <span class="rounded-full bg-white/10 px-2 py-0.5 text-xs text-zinc-400">${item.play_count} reproducciones</span>
              ${item.on_disk ? `<span class="rounded-full bg-spotify/15 px-2 py-0.5 text-xs font-semibold text-spotify">${formatBytes(item.file_size_bytes)}</span>` : ""}
            </div>
            <div class="mt-2.5 flex flex-wrap gap-2">
              ${linkHtml(yt, "YouTube")}
              ${linkHtml(sp, "Spotify")}
            </div>
          </div>
        </article>`;
    }

    function renderLikeCard(item) {
      const sp = spotifyUrl(item.spotify_id);
      return `
        <article class="${CARD}">
          <div class="${THUMB}">${thumbHtml(item.thumbnail, item.title)}</div>
          <div class="${BODY}">
            <div class="${TITLE}">${escapeHtml(item.title)}</div>
            <div class="${META}">${escapeHtml(item.artist)}</div>
            ${item.yt_query && item.yt_query !== "—" ? `<div class="${QUERY}">"${escapeHtml(item.yt_query)}"</div>` : ""}
            <div class="${META}">Like: ${formatTimestamp(item.liked_at)}</div>
            <div class="mt-2.5 flex flex-wrap gap-2">${linkHtml(sp, "Spotify")}</div>
          </div>
        </article>`;
    }

    function cellValue(tab, item, key) {
      if (key === "duration") return formatDuration(item.duration);
      if (key === "cached_at") return formatTimestamp(item.cached_at);
      if (key === "liked_at") return formatTimestamp(item.liked_at);
      if (key === "file_size_bytes") return item.on_disk ? formatBytes(item.file_size_bytes) : "—";
      if (key === "wasted_bytes") {
        return item.wasted_bytes > 0
          ? `<span class="text-amber-400">${formatBytes(item.wasted_bytes)}</span>`
          : "—";
      }
      if (key === "copies") {
        return item.copies > 1
          ? `<span class="text-amber-400">${item.copies}</span>`
          : "1";
      }
      if (key === "on_disk") {
        return item.on_disk
          ? `<span class="text-spotify">Sí</span>`
          : `<span class="text-zinc-600">No</span>`;
      }
      if (key === "query" || key === "yt_query") {
        return `<span class="italic text-spotify">"${escapeHtml(item[key])}"</span>`;
      }
      return escapeHtml(String(item[key] ?? "—"));
    }

    function tableLinks(tab, item) {
      if (tab === "searches") return linkHtml(youtubeUrl(item), "YouTube");
      if (tab === "library") {
        return [linkHtml(youtubeUrl(item), "YT"), linkHtml(spotifyUrl(item.spotify_id), "Spotify")]
          .filter(Boolean).join(" · ");
      }
      return linkHtml(spotifyUrl(item.spotify_id), "Spotify");
    }

    function renderTable(tab, items) {
      const cols = tab === "library" && libraryGrouped
        ? TABLE_COLUMNS.libraryGrouped
        : TABLE_COLUMNS[tab];

      let footer = "";
      if (tab === "library" && items.length > 0) {
        const shownBytes = items.reduce((s, i) => s + (i.file_size_bytes || 0), 0);
        const wasted = items.reduce((s, i) => s + (i.wasted_bytes || 0), 0);
        const label = libraryGrouped ? "canciones únicas" : "entradas";
        footer = `
          <tfoot class="border-t border-surface2 bg-surface/80">
            <tr>
              <td colspan="${cols.length}" class="${TD} text-right text-xs text-zinc-500">
                Mostrando ${formatBytes(shownBytes)} de ${formatBytes(diskUsage.total_bytes)} en disco
                (${items.length} ${label}${wasted > 0 ? ` · ${formatBytes(wasted)} desperdiciados` : ""})
              </td>
              <td class="${TD}"></td>
            </tr>
          </tfoot>`;
      }

      const header = cols.map((col) => `
        <th class="${TH}" data-sort="${col.key}">
          <span class="inline-flex items-center gap-1">${escapeHtml(col.label)} ${sortIndicator(col.key)}</span>
        </th>
      `).join("") + `<th class="${TH}">Enlaces</th>`;

      const rows = items.map((item) => `
        <tr class="border-t border-surface2/60 hover:bg-surface2/40">
          ${cols.map((col) => `<td class="${TD} max-w-xs truncate">${cellValue(tab, item, col.key)}</td>`).join("")}
          <td class="${TD} whitespace-nowrap">${tableLinks(tab, item)}</td>
        </tr>
      `).join("");

      return `
        <div class="${TABLE_WRAP}">
          <table class="w-full min-w-[720px]">
            <thead class="bg-surface">${header}</thead>
            <tbody>${rows}</tbody>
            ${footer}
          </table>
        </div>`;
    }

    function emptyMessage(tab, filter) {
      if (filter) return "Ningún resultado coincide con el filtro.";
      if (tab === "library") return "Sin pistas en biblioteca. El bot crea este índice al reproducir y cachear audio.";
      if (tab === "likes") return "Sin likes guardados aún.";
      return "Sin búsquedas cacheadas aún.";
    }

    function renderPanel(tab) {
      const filter = getFilterText();
      let items = getItemsForTab(tab);
      items = viewMode === "table" ? sortByTable(items) : sortByDropdown(items, tab);

      const gridId = `grid${tab.charAt(0).toUpperCase() + tab.slice(1)}`;
      const tableId = `table${tab.charAt(0).toUpperCase() + tab.slice(1)}`;
      const countId = `count${tab.charAt(0).toUpperCase() + tab.slice(1)}`;
      const grid = document.getElementById(gridId);
      const table = document.getElementById(tableId);
      const countEl = document.getElementById(countId);

      const renderFns = {
        searches: renderSearchCard,
        library: renderLibraryCard,
        likes: renderLikeCard,
      };

      if (items.length === 0) {
        countEl.textContent = "";
        const empty = emptyMessage(tab, filter);
        grid.innerHTML = viewMode === "grid" ? emptyHtml(empty) : "";
        table.innerHTML = viewMode === "table"
          ? `<div class="py-12 text-center text-sm text-zinc-500">${escapeHtml(empty)}</div>`
          : "";
        return;
      }

      const suffix = tab === "library" && libraryGrouped && viewMode === "table" ? " únicas" : "";
      countEl.textContent = `${items.length} resultado${items.length !== 1 ? "s" : ""}${suffix}${filter ? " (filtrado)" : ""}`;

      if (viewMode === "grid") {
        grid.innerHTML = items.map(renderFns[tab]).join("");
        table.innerHTML = "";
      } else {
        table.innerHTML = renderTable(tab, items);
        grid.innerHTML = "";
        table.querySelectorAll("th[data-sort]").forEach((th) => {
          th.addEventListener("click", () => {
            const col = th.dataset.sort;
            if (tableSort.column === col) {
              tableSort.dir = tableSort.dir === "asc" ? "desc" : "asc";
            } else {
              tableSort = { column: col, dir: "desc" };
            }
            renderPanel(activeTab);
          });
        });
      }
    }

    function renderAll() {
      renderPanel("searches");
      renderPanel("library");
      renderPanel("likes");
    }

    function updateStats() {
      document.getElementById("statSearches").textContent = searches.length;
      document.getElementById("statLibrary").textContent = library.length;
      document.getElementById("statLikes").textContent = likes.length;
      document.getElementById("statPlayed").textContent = playedCount;
      document.getElementById("statDisk").textContent = formatBytes(diskUsage.total_bytes);
      let diskDetail = diskUsage.tracks_on_disk > 0
        ? `${diskUsage.tracks_on_disk} archivos en library/`
        : "Sin audio cacheado";
      if (dedupePreview && dedupePreview.wasted_bytes > 0) {
        diskDetail += ` · ${dedupePreview.duplicate_groups} duplicados · ${formatBytes(dedupePreview.wasted_bytes)} recuperables`;
      }
      document.getElementById("statDiskDetail").textContent = diskDetail;
    }

    function updateDedupeUi() {
      const banner = document.getElementById("dedupeBanner");
      const btn = document.getElementById("dedupeBtn");
      const toggle = document.getElementById("libraryGroupToggle");

      if (activeTab === "library" && viewMode === "table") {
        toggle.classList.remove("hidden");
      } else {
        toggle.classList.add("hidden");
      }

      if (!dedupePreview || dedupePreview.wasted_bytes <= 0) {
        banner.classList.add("hidden");
        btn.classList.add("hidden");
        return;
      }

      banner.classList.remove("hidden");
      banner.textContent =
        `${dedupePreview.duplicate_groups} grupos duplicados · ` +
        `${formatBytes(dedupePreview.wasted_bytes)} recuperables · ` +
        `${dedupePreview.total_entries} entradas → ~${dedupePreview.unique_videos} canciones`;

      btn.classList.remove("hidden");
      btn.disabled = false;
      btn.textContent = "Limpiar duplicados";
    }

    async function runDedupe() {
      if (!dedupePreview || dedupePreview.wasted_bytes <= 0) return;
      const msg =
        `¿Eliminar duplicados y recuperar ~${formatBytes(dedupePreview.wasted_bytes)}?\n\n` +
        `${dedupePreview.duplicate_groups} grupos · ${dedupePreview.files_to_delete.length} archivos\n\n` +
        "Recomendado: detener el bot antes (docker compose stop bot).";
      if (!confirm(msg)) return;

      const btn = document.getElementById("dedupeBtn");
      btn.disabled = true;
      btn.textContent = "Limpiando…";

      try {
        const res = await fetch("/api/library/dedupe", { method: "POST" });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Error al limpiar");

        showBanner(
          `Limpieza completada: ${formatBytes(data.bytes_freed || dedupePreview.wasted_bytes)} liberados, ` +
          `${data.entries_after} entradas en biblioteca.`,
          "info"
        );
        await reloadData();
      } catch (err) {
        showBanner(`Error: ${err.message}`, "error");
        btn.disabled = false;
        btn.textContent = "Limpiar duplicados";
      }
    }

    async function reloadData() {
      const [libIndex, disk, dedupe] = await Promise.all([
        loadCacheJson("library_index.json"),
        loadDiskUsage(),
        fetch("/api/library/dedupe-preview").then((r) => r.ok ? r.json() : null).catch(() => null),
      ]);
      diskUsage = disk;
      dedupePreview = dedupe;
      library = transformLibrary(libIndex);
      updateStats();
      updateDedupeUi();
      renderAll();
    }

    function setLibraryGrouped(grouped) {
      libraryGrouped = grouped;
      document.getElementById("libGrouped").className = grouped
        ? "rounded-full bg-spotify px-3 py-1 font-semibold text-black"
        : "rounded-full px-3 py-1 font-semibold text-zinc-400 hover:text-white";
      document.getElementById("libDetailed").className = grouped
        ? "rounded-full px-3 py-1 font-semibold text-zinc-400 hover:text-white"
        : "rounded-full bg-spotify px-3 py-1 font-semibold text-black";
      if (viewMode === "table") tableSort = { ...DEFAULT_TABLE_SORT.library };
      renderPanel("library");
    }

    function showBanner(msg, type) {
      const el = document.getElementById("banner");
      el.textContent = msg;
      el.className = "mx-8 mt-4 rounded-lg px-4 py-3 text-sm " + (
        type === "error"
          ? "border border-red-400/30 bg-red-400/10 text-red-400"
          : "border border-spotify/25 bg-spotify/15 text-spotify"
      );
    }

    function setCacheBadge() {
      const el = document.getElementById("cacheBadge");
      el.textContent = cacheDir ? `Caché: /${cacheDir}/` : "Sin caché encontrada";
    }

    function setTabClasses(btn, isActive) {
      btn.className = "tab px-5 py-3 text-sm font-semibold " + (isActive ? TAB_ACTIVE : TAB_INACTIVE);
    }

    function setViewMode(mode) {
      viewMode = mode;
      const gridBtn = document.getElementById("viewGrid");
      const tableBtn = document.getElementById("viewTable");
      const sortSelect = document.getElementById("sortSelect");

      if (mode === "grid") {
        gridBtn.className = "view-btn rounded-full bg-spotify px-4 py-1.5 font-semibold text-black";
        tableBtn.className = "view-btn rounded-full px-4 py-1.5 font-semibold text-zinc-400 hover:text-white";
        sortSelect.classList.remove("hidden");
        ["searches", "library", "likes"].forEach((name) => {
          document.getElementById(`grid${name.charAt(0).toUpperCase() + name.slice(1)}`).classList.remove("hidden");
          document.getElementById(`table${name.charAt(0).toUpperCase() + name.slice(1)}`).classList.add("hidden");
        });
      } else {
        tableBtn.className = "view-btn rounded-full bg-spotify px-4 py-1.5 font-semibold text-black";
        gridBtn.className = "view-btn rounded-full px-4 py-1.5 font-semibold text-zinc-400 hover:text-white";
        sortSelect.classList.add("hidden");
        tableSort = { ...DEFAULT_TABLE_SORT[activeTab] };
        ["searches", "library", "likes"].forEach((name) => {
          document.getElementById(`grid${name.charAt(0).toUpperCase() + name.slice(1)}`).classList.add("hidden");
          document.getElementById(`table${name.charAt(0).toUpperCase() + name.slice(1)}`).classList.remove("hidden");
        });
      }
      updateDedupeUi();
      renderAll();
    }

    function updateSortOptions() {
      const sel = document.getElementById("sortSelect");
      const playsOpt = sel.querySelector('option[value="plays"]');
      const durOpt = sel.querySelector('option[value="duration"]');
      const sizeOpt = sel.querySelector('option[value="size"]');
      if (activeTab === "library") {
        playsOpt.hidden = false;
        durOpt.hidden = false;
        sizeOpt.hidden = false;
      } else if (activeTab === "searches") {
        playsOpt.hidden = true;
        sizeOpt.hidden = true;
        durOpt.hidden = false;
        if (sel.value === "plays" || sel.value === "size") sel.value = "recent";
      } else {
        playsOpt.hidden = true;
        durOpt.hidden = true;
        sizeOpt.hidden = true;
        if (["plays", "duration", "size"].includes(sel.value)) sel.value = "recent";
      }
    }

    document.querySelectorAll(".tab").forEach((btn) => {
      btn.addEventListener("click", () => {
        activeTab = btn.dataset.tab;
        document.querySelectorAll(".tab").forEach((t) => setTabClasses(t, t.dataset.tab === activeTab));
        ["searches", "library", "likes"].forEach((name) => {
          document.getElementById(`panel-${name}`).classList.toggle("hidden", name !== activeTab);
        });
        if (viewMode === "table") tableSort = { ...DEFAULT_TABLE_SORT[activeTab] };
        updateSortOptions();
        updateDedupeUi();
        renderPanel(activeTab);
      });
    });

    document.getElementById("viewGrid").addEventListener("click", () => setViewMode("grid"));
    document.getElementById("viewTable").addEventListener("click", () => setViewMode("table"));
    document.getElementById("libGrouped").addEventListener("click", () => setLibraryGrouped(true));
    document.getElementById("libDetailed").addEventListener("click", () => setLibraryGrouped(false));
    document.getElementById("dedupeBtn").addEventListener("click", runDedupe);
    document.getElementById("searchInput").addEventListener("input", renderAll);
    document.getElementById("sortSelect").addEventListener("change", renderAll);

    async function init() {
      ["Searches", "Library", "Likes"].forEach((name) => {
        document.getElementById(`grid${name}`).innerHTML = loadingHtml();
        document.getElementById(`table${name}`).innerHTML = loadingHtml();
      });

      const [ytMeta, libIndex, likesRaw, playedRaw, disk] = await Promise.all([
        loadCacheJson("youtube_metadata.json"),
        loadCacheJson("library_index.json"),
        loadCacheJson("likes.json"),
        loadCacheJson("played_ids.json"),
        loadDiskUsage(),
      ]);

      if (!cacheDir) {
        showBanner(
          "No se encontró carpeta de caché (.cache/ ni spotify_cache/). " +
          "Con Docker: docker compose up -d explorer. Sin Docker: ./serve_explorer.sh",
          "error"
        );
        ["Searches", "Library", "Likes"].forEach((name) => {
          document.getElementById(`grid${name}`).innerHTML = emptyHtml("Sin datos disponibles.");
          document.getElementById(`table${name}`).innerHTML = "";
        });
        setCacheBadge();
        return;
      }

      diskUsage = disk;
      setCacheBadge();
      searches = transformSearches(ytMeta);
      library = transformLibrary(libIndex);
      likes = transformLikes(likesRaw);
      playedCount = countPlayedIds(playedRaw);

      await loadDedupePreview();
      updateStats();
      renderAll();

      if (searches.length === 0 && library.length === 0 && likes.length === 0) {
        showBanner("La carpeta de caché existe pero aún no hay datos. Usa !play o !search en Discord.", "info");
      }
    }

    init();
  </script>
</body>
</html>
