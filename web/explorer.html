<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sona explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: "#201d1d",
            canvas: "#fdfcfc",
            body: "#424245",
            mute: "#646262",
            ash: "#9a9898",
            soft: "#f8f7f7",
            accent: "#007aff",
            warn: "#ff9f0a",
            danger: "#ff3b30",
            ok: "#30d158",
          },
          fontFamily: {
            mono: ["JetBrains Mono", "IBM Plex Mono", "ui-monospace", "Menlo", "monospace"],
          },
          maxWidth: { content: "960px" },
        },
      },
    };
  </script>
</head>
<body class="overflow-x-hidden max-w-full font-mono text-[13px] text-body bg-canvas antialiased">
  <header class="bg-ink text-canvas py-5 mb-8">
    <div class="max-w-content mx-auto px-5 flex items-baseline justify-between gap-4 flex-wrap">
      <h1 class="text-lg font-bold text-canvas tracking-tight m-0">sona</h1>
      <span id="cacheBadge" class="text-[11px] text-ash">cargando…</span>
    </div>
  </header>

  <div class="max-w-content mx-auto px-5 pb-12">
    <div id="banner" class="hidden"></div>

    <p id="statsLine" class="text-xs text-mute border-b border-black/10 pb-4 mb-5">—</p>

    <div class="flex flex-wrap items-center gap-3 mb-6">
      <div class="flex-1 min-w-[200px]">
        <input type="search" id="searchInput" class="h-10 w-full rounded border border-black/10 bg-soft px-3 text-sm text-ink focus:outline-none focus:border-mute" placeholder="filtrar…" autocomplete="off">
      </div>
      <select id="sortSelect" class="h-10 rounded border border-black/10 bg-soft px-3 text-sm text-ink focus:outline-none cursor-pointer">
        <option value="recent">más reciente</option>
        <option value="alpha">alfabético</option>
        <option value="duration">duración</option>
        <option value="plays">más reproducidas</option>
        <option value="size">mayor tamaño</option>
      </select>
      <div class="flex overflow-hidden rounded border border-black/10">
        <button id="viewGrid" type="button" class="px-4 py-1 text-sm font-medium bg-ink text-canvas">tarjetas</button>
        <button id="viewTable" type="button" class="px-4 py-1 text-sm font-medium text-mute hover:text-ink">tabla</button>
      </div>
    </div>

    <nav class="flex border-b border-black/10 mb-6">
      <button type="button" class="px-5 py-3 text-sm font-medium text-ink border-b-2 border-ink" data-tab="searches">búsquedas</button>
      <button type="button" class="px-5 py-3 text-sm font-medium text-mute border-b-2 border-transparent hover:text-ink" data-tab="library">biblioteca</button>
      <button type="button" class="px-5 py-3 text-sm font-medium text-mute border-b-2 border-transparent hover:text-ink" data-tab="likes">likes</button>
    </nav>

    <main>
      <section id="panel-searches" class="block">
        <p id="countSearches" class="text-[11px] text-ash mb-3"></p>
        <div id="gridSearches" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
        <div id="tableSearches" class="hidden"></div>
      </section>

      <section id="panel-library" class="hidden">
        <div id="libraryToolbar" class="flex flex-wrap items-center gap-3 mb-4">
          <div id="dedupeBanner" class="hidden flex-1 min-w-[200px] border border-warn/40 px-3.5 py-2.5 text-sm text-warn"></div>
          <div id="libraryGroupToggle" class="hidden flex overflow-hidden rounded border border-black/10">
            <button id="libGrouped" type="button" class="px-4 py-1 text-sm font-medium bg-ink text-canvas">agrupado</button>
            <button id="libDetailed" type="button" class="px-4 py-1 text-sm font-medium text-mute hover:text-ink">detallado</button>
          </div>
          <button id="dedupeBtn" type="button" class="hidden px-4 py-2 text-sm font-medium text-danger border border-danger/30 bg-danger/10 rounded hover:bg-danger/15 disabled:opacity-50">dedupe</button>
        </div>
        <p id="countLibrary" class="text-[11px] text-ash mb-3"></p>
        <div id="gridLibrary" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
        <div id="tableLibrary" class="hidden"></div>
      </section>

      <section id="panel-likes" class="hidden">
        <p id="countLikes" class="text-[11px] text-ash mb-3"></p>
        <div id="gridLikes" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
        <div id="tableLikes" class="hidden"></div>
      </section>
    </main>

    <footer class="mt-8 text-[11px] text-ash">explorer</footer>
  </div>

  <script>
    const CACHE_DIRS = [".cache", "spotify_cache"];

    const UI = {
      btn: "px-4 py-1 text-sm font-medium text-mute hover:text-ink",
      btnActive: "px-4 py-1 text-sm font-medium bg-ink text-canvas",
      btnDanger: "px-4 py-2 text-sm font-medium text-danger border border-danger/30 bg-danger/10 rounded hover:bg-danger/15 disabled:opacity-50",
      tab: "px-5 py-3 text-sm font-medium text-mute border-b-2 border-transparent hover:text-ink",
      tabActive: "px-5 py-3 text-sm font-medium text-ink border-b-2 border-ink",
      banner: "mb-6 border px-4 py-3 text-sm",
      bannerInfo: "border-accent/30 bg-soft text-ink",
      bannerError: "border-danger/30 bg-soft text-danger",
      link: "text-ink hover:text-accent hover:underline underline-offset-2",
      empty: "py-12 text-center text-sm text-mute border border-black/10",
      card: "border border-black/10 bg-canvas overflow-hidden hover:border-mute",
      cardThumb: "aspect-video bg-soft flex items-center justify-center overflow-hidden",
      cardThumbImg: "w-full h-full object-cover",
      cardBody: "p-3",
      cardTitle: "text-sm font-medium text-ink line-clamp-2 mb-1",
      cardMeta: "text-[11px] text-mute",
      cardLinks: "mt-2 text-[11px]",
      tableWrap: "w-full overflow-hidden border border-black/10",
      th: "px-2.5 py-2 text-[11px] font-medium text-mute text-left truncate cursor-pointer select-none hover:text-ink",
      thNum: "px-2.5 py-2 text-[11px] font-medium text-mute text-right truncate cursor-pointer select-none hover:text-ink",
      td: "px-2.5 py-2 text-[13px] text-body border-t border-black/10 truncate align-top",
      tdTitle: "px-2.5 py-2 text-[13px] text-body border-t border-black/10 whitespace-normal break-words align-top",
      tdNum: "px-2.5 py-2 text-[13px] text-body border-t border-black/10 truncate text-right align-top",
      rowHover: "hover:bg-soft",
    };

    let cacheDir = null;
    let activeTab = "searches";
    let viewMode = "grid";
    let tableSort = { column: "cached_at", dir: "desc" };
    let searches = [];
    let library = [];
    let likes = [];
    let playedCount = 0;
    let diskUsage = { total_bytes: 0, files: {}, tracks_on_disk: 0 };
    let dedupePreview = null;
    let libraryGrouped = true;

    const TABLE_COLUMNS = {
      searches: [
        { key: "title", label: "título", wide: true },
        { key: "duration", label: "dur", numeric: true, narrow: true },
        { key: "cached_at", label: "fecha", numeric: true },
      ],
      library: [
        { key: "title", label: "título", wide: true },
        { key: "artist", label: "artista" },
        { key: "play_count", label: "plays", numeric: true, narrow: true },
        { key: "file_size_bytes", label: "tamaño", numeric: true, narrow: true },
      ],
      libraryGrouped: [
        { key: "title", label: "título", wide: true },
        { key: "artist", label: "artista" },
        { key: "play_count", label: "plays", numeric: true, narrow: true },
        { key: "file_size_bytes", label: "tamaño", numeric: true, narrow: true },
        { key: "copies", label: "dup", numeric: true, narrow: true },
      ],
      likes: [
        { key: "title", label: "título", wide: true },
        { key: "artist", label: "artista" },
        { key: "liked_at", label: "fecha", numeric: true, narrow: true },
      ],
    };

    const COL_WIDTHS = { wide: "44%", artist: "24%", default: "14%", narrow: "9%" };

    const DEFAULT_TABLE_SORT = {
      searches: { column: "cached_at", dir: "desc" },
      library: { column: "file_size_bytes", dir: "desc" },
      likes: { column: "liked_at", dir: "desc" },
    };

    async function loadCacheJson(filename) {
      for (const dir of CACHE_DIRS) {
        try {
          const res = await fetch(`/${dir}/${filename}`);
          if (res.ok) {
            cacheDir = dir;
            return await res.json();
          }
        } catch (_) { /* try next */ }
      }
      return null;
    }

    async function loadDiskUsage() {
      try {
        const res = await fetch("/api/disk-usage");
        if (res.ok) return await res.json();
      } catch (_) { /* static fallback */ }
      return { total_bytes: 0, files: {}, tracks_on_disk: 0 };
    }

    async function loadDedupePreview() {
      try {
        const res = await fetch("/api/library/dedupe-preview");
        if (res.ok) {
          dedupePreview = await res.json();
          updateDedupeUi();
        }
      } catch (_) { /* API unavailable */ }
    }

    function groupLibraryItems(items) {
      const byVideo = new Map();
      const noVideo = [];

      for (const item of items) {
        if (!item.video_id) {
          noVideo.push({ ...item, copies: 1, wasted_bytes: 0 });
          continue;
        }
        const existing = byVideo.get(item.video_id);
        if (!existing) {
          byVideo.set(item.video_id, {
            ...item,
            copies: 1,
            wasted_bytes: 0,
            all_sizes: [item.file_size_bytes || 0],
          });
          continue;
        }
        existing.copies += 1;
        existing.play_count += item.play_count || 0;
        existing.request_count += item.request_count || 0;
        existing.all_sizes.push(item.file_size_bytes || 0);
        existing.cached_at = Math.max(existing.cached_at || 0, item.cached_at || 0);
        if ((item.file_size_bytes || 0) > (existing.file_size_bytes || 0)) {
          Object.assign(existing, {
            trackId: item.trackId,
            title: item.title,
            thumbnail: item.thumbnail,
            file_size_bytes: item.file_size_bytes,
            on_disk: item.on_disk,
            spotify_id: item.spotify_id || existing.spotify_id,
          });
        }
      }

      return [...byVideo.values(), ...noVideo].map((item) => {
        if (item.all_sizes) {
          const sizes = item.all_sizes.filter((s) => s > 0).sort((a, b) => b - a);
          item.file_size_bytes = sizes[0] || 0;
          item.wasted_bytes = sizes.length > 1 ? sizes.slice(1).reduce((a, b) => a + b, 0) : 0;
          delete item.all_sizes;
        }
        return item;
      });
    }

    function formatDuration(sec) {
      if (!sec || sec < 0) return "—";
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return `${m}:${String(s).padStart(2, "0")}`;
    }

    function formatBytes(bytes) {
      if (!bytes || bytes <= 0) return "—";
      const units = ["B", "KB", "MB", "GB"];
      let n = bytes;
      let i = 0;
      while (n >= 1024 && i < units.length - 1) {
        n /= 1024;
        i++;
      }
      return `${n.toFixed(i === 0 ? 0 : 1)} ${units[i]}`;
    }

    function formatTimestamp(unix) {
      if (!unix) return "—";
      return new Date(unix * 1000).toLocaleDateString("es", {
        day: "2-digit", month: "short", year: "2-digit",
      });
    }

    function spotifyUrl(id) {
      return id ? `https://open.spotify.com/track/${id}` : null;
    }

    function youtubeUrl(entry) {
      if (entry.webpage_url) return entry.webpage_url;
      if (entry.video_id) return `https://www.youtube.com/watch?v=${entry.video_id}`;
      return null;
    }

    function escapeHtml(str) {
      const d = document.createElement("div");
      d.textContent = str ?? "";
      return d.innerHTML;
    }

    function thumbHtml(thumbnail, alt) {
      if (thumbnail) {
        return `<img src="${escapeHtml(thumbnail)}" alt="${escapeHtml(alt)}" loading="lazy" class="${UI.cardThumbImg}">`;
      }
      return `<span class="text-3xl text-ash">♪</span>`;
    }

    function linkHtml(href, label) {
      if (!href) return "";
      return `<a href="${escapeHtml(href)}" target="_blank" rel="noopener" class="${UI.link}">${escapeHtml(label)}</a>`;
    }

    function emptyHtml(msg) {
      return `<div class="${UI.empty}">${escapeHtml(msg)}</div>`;
    }

    function loadingHtml() {
      return `<div class="${UI.empty}"><span class="inline-block h-3.5 w-3.5 animate-spin rounded-full border-2 border-black/10 border-t-ink align-middle mr-2"></span>cargando</div>`;
    }

    function resolveFileSize(trackId, entry) {
      if (entry.file_size_bytes > 0) return entry.file_size_bytes;
      return diskUsage.files[trackId] || 0;
    }

    function transformSearches(raw) {
      if (!raw || typeof raw !== "object") return [];
      return Object.entries(raw).map(([query, meta]) => ({
        query,
        title: meta.title || query,
        thumbnail: meta.thumbnail,
        duration: meta.duration || 0,
        uploader: meta.uploader || "—",
        webpage_url: meta.webpage_url,
        video_id: meta.video_id,
        cached_at: meta.cached_at || 0,
      }));
    }

    function transformLibrary(raw) {
      if (!raw || typeof raw !== "object") return [];
      return Object.entries(raw).map(([trackId, entry]) => {
        const fileSize = resolveFileSize(trackId, entry);
        const onDisk = fileSize > 0 || !!diskUsage.files[trackId];
        return {
          trackId,
          title: entry.title || trackId,
          artist: entry.artist || "—",
          thumbnail: entry.thumbnail,
          yt_query: entry.yt_query,
          spotify_id: entry.spotify_id,
          video_id: entry.video_id,
          webpage_url: entry.webpage_url,
          duration: entry.duration || 0,
          play_count: entry.play_count || 0,
          request_count: entry.request_count || 0,
          last_played: entry.last_played || 0,
          cached_at: entry.cached_at || 0,
          file_path: entry.file_path,
          file_size_bytes: fileSize,
          on_disk: onDisk,
        };
      });
    }

    function transformLikes(raw) {
      if (!raw || typeof raw !== "object") return [];
      const flat = [];
      for (const [guildId, users] of Object.entries(raw)) {
        if (!users || typeof users !== "object") continue;
        for (const [userId, tracks] of Object.entries(users)) {
          if (!Array.isArray(tracks)) continue;
          for (const t of tracks) {
            flat.push({
              guildId,
              userId,
              track_id: t.track_id,
              title: t.title || "—",
              artist: t.artist || "—",
              yt_query: t.yt_query || "—",
              spotify_id: t.spotify_id,
              thumbnail: t.thumbnail,
              liked_at: t.liked_at || 0,
            });
          }
        }
      }
      return flat;
    }

    function countPlayedIds(raw) {
      if (!raw || typeof raw !== "object") return 0;
      let total = 0;
      for (const ids of Object.values(raw)) {
        if (Array.isArray(ids)) total += ids.length;
      }
      return total;
    }

    function getFilterText() {
      return document.getElementById("searchInput").value.trim().toLowerCase();
    }

    function matchesFilter(item, fields) {
      const q = getFilterText();
      if (!q) return true;
      return fields.some((f) => String(f || "").toLowerCase().includes(q));
    }

    function getItemsForTab(tab) {
      if (tab === "searches") {
        return searches.filter((i) => matchesFilter(i, [i.query, i.title, i.uploader]));
      }
      if (tab === "library") {
        const filtered = library.filter((i) => matchesFilter(i, [i.title, i.artist, i.yt_query, i.trackId]));
        if (libraryGrouped && viewMode === "table") return groupLibraryItems(filtered);
        return filtered;
      }
      return likes.filter((i) => matchesFilter(i, [i.title, i.artist, i.yt_query]));
    }

    function sortByDropdown(items, tab) {
      const key = document.getElementById("sortSelect").value;
      const sorted = [...items];
      if (tab === "searches") {
        if (key === "alpha") sorted.sort((a, b) => a.title.localeCompare(b.title));
        else if (key === "duration") sorted.sort((a, b) => b.duration - a.duration);
        else sorted.sort((a, b) => b.cached_at - a.cached_at);
      } else if (tab === "library") {
        if (key === "alpha") sorted.sort((a, b) => a.title.localeCompare(b.title));
        else if (key === "duration") sorted.sort((a, b) => b.duration - a.duration);
        else if (key === "size") sorted.sort((a, b) => b.file_size_bytes - a.file_size_bytes);
        else sorted.sort((a, b) => b.play_count - a.play_count);
      } else if (tab === "likes") {
        if (key === "alpha") sorted.sort((a, b) => a.title.localeCompare(b.title));
        else sorted.sort((a, b) => b.liked_at - a.liked_at);
      }
      return sorted;
    }

    function sortByTable(items) {
      const { column, dir } = tableSort;
      const sorted = [...items];
      const mul = dir === "asc" ? 1 : -1;
      sorted.sort((a, b) => {
        let av = a[column];
        let bv = b[column];
        if (typeof av === "boolean") av = av ? 1 : 0;
        if (typeof bv === "boolean") bv = bv ? 1 : 0;
        if (typeof av === "number" && typeof bv === "number") return (av - bv) * mul;
        return String(av || "").localeCompare(String(bv || ""), "es") * mul;
      });
      return sorted;
    }

    function sortIndicator(column) {
      if (tableSort.column !== column) return `<span class="text-ash">↕</span>`;
      return tableSort.dir === "asc"
        ? `<span class="text-accent">↑</span>`
        : `<span class="text-accent">↓</span>`;
    }

    function renderSearchCard(item) {
      const yt = youtubeUrl(item);
      return `
        <article class="${UI.card}">
          <div class="${UI.cardThumb}">${thumbHtml(item.thumbnail, item.title)}</div>
          <div class="${UI.cardBody}">
            <div class="${UI.cardTitle}">${escapeHtml(item.title)}</div>
            <div class="${UI.cardMeta}">${formatDuration(item.duration)} · ${formatTimestamp(item.cached_at)}</div>
            <div class="${UI.cardLinks}">${linkHtml(yt, "yt")}</div>
          </div>
        </article>`;
    }

    function renderLibraryCard(item) {
      const yt = youtubeUrl(item);
      const sp = spotifyUrl(item.spotify_id);
      const size = item.on_disk ? formatBytes(item.file_size_bytes) : "—";
      return `
        <article class="${UI.card}">
          <div class="${UI.cardThumb}">${thumbHtml(item.thumbnail, item.title)}</div>
          <div class="${UI.cardBody}">
            <div class="${UI.cardTitle}">${escapeHtml(item.title)}</div>
            <div class="${UI.cardMeta}">${escapeHtml(item.artist)} · ${item.play_count} · ${size}</div>
            <div class="${UI.cardLinks}">${linkHtml(yt, "yt")}${sp ? " · " + linkHtml(sp, "sp") : ""}</div>
          </div>
        </article>`;
    }

    function renderLikeCard(item) {
      const sp = spotifyUrl(item.spotify_id);
      return `
        <article class="${UI.card}">
          <div class="${UI.cardThumb}">${thumbHtml(item.thumbnail, item.title)}</div>
          <div class="${UI.cardBody}">
            <div class="${UI.cardTitle}">${escapeHtml(item.title)}</div>
            <div class="${UI.cardMeta}">${escapeHtml(item.artist)} · ${formatTimestamp(item.liked_at)}</div>
            <div class="${UI.cardLinks}">${linkHtml(sp, "sp")}</div>
          </div>
        </article>`;
    }

    function tableLinks(tab, item) {
      if (tab === "searches") return linkHtml(youtubeUrl(item), "yt");
      if (tab === "library") {
        return [linkHtml(youtubeUrl(item), "yt"), linkHtml(spotifyUrl(item.spotify_id), "sp")]
          .filter(Boolean).join(" ");
      }
      return linkHtml(spotifyUrl(item.spotify_id), "sp");
    }

    function titleCell(tab, item) {
      const links = tableLinks(tab, item);
      let sub = "";
      if (tab === "searches" && item.query && item.query !== item.title) {
        sub = `<span class="block text-[11px] text-ash mt-0.5">${escapeHtml(item.query)}</span>`;
      }
      return `<span class="font-medium text-ink">${escapeHtml(item.title || "—")}</span>${sub}` +
        (links ? `<span class="block text-[11px] mt-1">${links}</span>` : "");
    }

    function cellValue(tab, item, key) {
      if (key === "title") return titleCell(tab, item);
      if (key === "duration") return formatDuration(item.duration);
      if (key === "cached_at" || key === "liked_at") return formatTimestamp(item[key]);
      if (key === "file_size_bytes") return item.on_disk ? formatBytes(item.file_size_bytes) : "—";
      if (key === "copies") {
        if (item.copies <= 1) return "—";
        const extra = item.wasted_bytes > 0 ? ` ${formatBytes(item.wasted_bytes)}` : "";
        return `<span class="text-warn">${item.copies}${extra}</span>`;
      }
      return escapeHtml(String(item[key] ?? "—"));
    }

    function colWidth(col) {
      if (col.wide) return COL_WIDTHS.wide;
      if (col.narrow) return COL_WIDTHS.narrow;
      if (col.key === "artist") return COL_WIDTHS.artist;
      return COL_WIDTHS.default;
    }

    function thClass(col) {
      return col.numeric ? UI.thNum : UI.th;
    }

    function tdClass(col) {
      if (col.key === "title") return UI.tdTitle;
      return col.numeric ? UI.tdNum : UI.td;
    }

    function renderTable(tab, items) {
      const cols = tab === "library" && libraryGrouped
        ? TABLE_COLUMNS.libraryGrouped
        : TABLE_COLUMNS[tab];

      let footer = "";
      if (tab === "library" && items.length > 0) {
        const shownBytes = items.reduce((s, i) => s + (i.file_size_bytes || 0), 0);
        footer = `
          <tfoot>
            <tr class="bg-soft">
              <td colspan="${cols.length}" class="px-2.5 py-2 text-[11px] text-mute text-right">
                ${formatBytes(shownBytes)} / ${formatBytes(diskUsage.total_bytes)} · ${items.length} filas
              </td>
            </tr>
          </tfoot>`;
      }

      const colgroup = cols.map((col) =>
        `<col style="width:${colWidth(col)}">`
      ).join("");

      const header = cols.map((col) => `
        <th class="${thClass(col)}" data-sort="${col.key}">
          ${escapeHtml(col.label)} ${sortIndicator(col.key)}
        </th>
      `).join("");

      const rows = items.map((item) => `
        <tr class="${UI.rowHover}">
          ${cols.map((col) => `<td class="${tdClass(col)}">${cellValue(tab, item, col.key)}</td>`).join("")}
        </tr>
      `).join("");

      return `
        <div class="${UI.tableWrap}">
          <table class="w-full table-fixed border-collapse">
            <colgroup>${colgroup}</colgroup>
            <thead class="bg-soft"><tr>${header}</tr></thead>
            <tbody>${rows}</tbody>
            ${footer}
          </table>
        </div>`;
    }

    function emptyMessage(tab, filter) {
      if (filter) return "sin resultados";
      if (tab === "library") return "biblioteca vacía";
      if (tab === "likes") return "sin likes";
      return "sin búsquedas";
    }

    function renderPanel(tab) {
      const filter = getFilterText();
      let items = getItemsForTab(tab);
      items = viewMode === "table" ? sortByTable(items) : sortByDropdown(items, tab);

      const gridId = `grid${tab.charAt(0).toUpperCase() + tab.slice(1)}`;
      const tableId = `table${tab.charAt(0).toUpperCase() + tab.slice(1)}`;
      const countId = `count${tab.charAt(0).toUpperCase() + tab.slice(1)}`;
      const grid = document.getElementById(gridId);
      const table = document.getElementById(tableId);
      const countEl = document.getElementById(countId);

      const renderFns = {
        searches: renderSearchCard,
        library: renderLibraryCard,
        likes: renderLikeCard,
      };

      if (items.length === 0) {
        countEl.textContent = "";
        const empty = emptyMessage(tab, filter);
        grid.innerHTML = viewMode === "grid" ? emptyHtml(empty) : "";
        table.innerHTML = viewMode === "table"
          ? `<div class="${UI.empty}">${escapeHtml(empty)}</div>`
          : "";
        return;
      }

      countEl.textContent = filter ? `${items.length} / filtro` : "";

      if (viewMode === "grid") {
        grid.innerHTML = items.map(renderFns[tab]).join("");
        grid.classList.remove("hidden");
        table.classList.add("hidden");
        table.innerHTML = "";
      } else {
        table.innerHTML = renderTable(tab, items);
        table.classList.remove("hidden");
        grid.classList.add("hidden");
        grid.innerHTML = "";
        table.querySelectorAll("th[data-sort]").forEach((th) => {
          th.addEventListener("click", () => {
            const col = th.dataset.sort;
            if (tableSort.column === col) {
              tableSort.dir = tableSort.dir === "asc" ? "desc" : "asc";
            } else {
              tableSort = { column: col, dir: "desc" };
            }
            renderPanel(activeTab);
          });
        });
      }
    }

    function renderAll() {
      renderPanel("searches");
      renderPanel("library");
      renderPanel("likes");
    }

    function updateStats() {
      const parts = [
        `<strong class="font-medium text-ink">${library.length}</strong> biblioteca`,
        `<strong class="font-medium text-ink">${searches.length}</strong> búsquedas`,
        `<strong class="font-medium text-ink">${likes.length}</strong> likes`,
        `<strong class="font-medium text-ink">${formatBytes(diskUsage.total_bytes)}</strong> disco`,
      ];
      if (dedupePreview && dedupePreview.wasted_bytes > 0) {
        parts.push(`<span class="text-warn">${dedupePreview.duplicate_groups} dup</span>`);
      }
      document.getElementById("statsLine").innerHTML = parts.join(" · ");
    }

    function updateDedupeUi() {
      const banner = document.getElementById("dedupeBanner");
      const btn = document.getElementById("dedupeBtn");
      const toggle = document.getElementById("libraryGroupToggle");

      if (activeTab === "library" && viewMode === "table") {
        toggle.classList.remove("hidden");
      } else {
        toggle.classList.add("hidden");
      }

      if (!dedupePreview || dedupePreview.wasted_bytes <= 0) {
        banner.classList.add("hidden");
        btn.classList.add("hidden");
        return;
      }

      banner.classList.remove("hidden");
      banner.textContent =
        `${dedupePreview.duplicate_groups} duplicados · ${formatBytes(dedupePreview.wasted_bytes)} recuperables`;

      btn.classList.remove("hidden");
      btn.className = UI.btnDanger;
      btn.disabled = false;
      btn.textContent = "dedupe";
    }

    async function runDedupe() {
      if (!dedupePreview || dedupePreview.wasted_bytes <= 0) return;
      const msg =
        `¿eliminar duplicados y recuperar ~${formatBytes(dedupePreview.wasted_bytes)}?\n\n` +
        `${dedupePreview.duplicate_groups} grupos · ${dedupePreview.files_to_delete.length} archivos\n\n` +
        "recomendado: detener el bot antes (docker compose stop bot).";
      if (!confirm(msg)) return;

      const btn = document.getElementById("dedupeBtn");
      btn.disabled = true;
      btn.className = UI.btnDanger;
      btn.textContent = "limpiando…";

      try {
        const res = await fetch("/api/library/dedupe", { method: "POST" });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "error al limpiar");

        showBanner(
          `liberados ${formatBytes(data.bytes_freed || dedupePreview.wasted_bytes)} · ${data.entries_after} entradas`,
          "info"
        );
        await reloadData();
      } catch (err) {
        showBanner(`[-] error: ${err.message}`, "error");
        btn.disabled = false;
        btn.className = UI.btnDanger;
        btn.textContent = "dedupe";
      }
    }

    async function reloadData() {
      const [libIndex, disk, dedupe] = await Promise.all([
        loadCacheJson("library_index.json"),
        loadDiskUsage(),
        fetch("/api/library/dedupe-preview").then((r) => r.ok ? r.json() : null).catch(() => null),
      ]);
      diskUsage = disk;
      dedupePreview = dedupe;
      library = transformLibrary(libIndex);
      updateStats();
      updateDedupeUi();
      renderAll();
    }

    function setLibraryGrouped(grouped) {
      libraryGrouped = grouped;
      document.getElementById("libGrouped").className = grouped ? UI.btnActive : UI.btn;
      document.getElementById("libDetailed").className = grouped ? UI.btn : UI.btnActive;
      if (viewMode === "table") tableSort = { ...DEFAULT_TABLE_SORT.library };
      renderPanel("library");
    }

    function showBanner(msg, type) {
      const el = document.getElementById("banner");
      el.textContent = msg;
      el.className = `${UI.banner} ${type === "error" ? UI.bannerError : UI.bannerInfo}`;
    }

    function setCacheBadge() {
      const el = document.getElementById("cacheBadge");
      el.textContent = cacheDir ? `/${cacheDir}/` : "sin caché";
    }

    function setTab() {
      document.querySelectorAll("[data-tab]").forEach((t) => {
        t.className = t.dataset.tab === activeTab ? UI.tabActive : UI.tab;
      });
    }

    function setViewMode(mode) {
      viewMode = mode;
      document.getElementById("viewGrid").className = mode === "grid" ? UI.btnActive : UI.btn;
      document.getElementById("viewTable").className = mode === "table" ? UI.btnActive : UI.btn;
      const sortSelect = document.getElementById("sortSelect");

      if (mode === "grid") {
        sortSelect.classList.remove("hidden");
        ["searches", "library", "likes"].forEach((name) => {
          document.getElementById(`grid${name.charAt(0).toUpperCase() + name.slice(1)}`).classList.remove("hidden");
          document.getElementById(`table${name.charAt(0).toUpperCase() + name.slice(1)}`).classList.add("hidden");
        });
      } else {
        sortSelect.classList.add("hidden");
        tableSort = { ...DEFAULT_TABLE_SORT[activeTab] };
        ["searches", "library", "likes"].forEach((name) => {
          document.getElementById(`grid${name.charAt(0).toUpperCase() + name.slice(1)}`).classList.add("hidden");
          document.getElementById(`table${name.charAt(0).toUpperCase() + name.slice(1)}`).classList.remove("hidden");
        });
      }
      updateDedupeUi();
      renderAll();
    }

    function updateSortOptions() {
      const sel = document.getElementById("sortSelect");
      const playsOpt = sel.querySelector('option[value="plays"]');
      const durOpt = sel.querySelector('option[value="duration"]');
      const sizeOpt = sel.querySelector('option[value="size"]');
      if (activeTab === "library") {
        playsOpt.hidden = false;
        durOpt.hidden = false;
        sizeOpt.hidden = false;
      } else if (activeTab === "searches") {
        playsOpt.hidden = true;
        sizeOpt.hidden = true;
        durOpt.hidden = false;
        if (sel.value === "plays" || sel.value === "size") sel.value = "recent";
      } else {
        playsOpt.hidden = true;
        durOpt.hidden = true;
        sizeOpt.hidden = true;
        if (["plays", "duration", "size"].includes(sel.value)) sel.value = "recent";
      }
    }

    document.querySelectorAll("[data-tab]").forEach((btn) => {
      btn.addEventListener("click", () => {
        activeTab = btn.dataset.tab;
        setTab();
        ["searches", "library", "likes"].forEach((name) => {
          const panel = document.getElementById(`panel-${name}`);
          panel.className = name === activeTab ? "block" : "hidden";
        });
        if (viewMode === "table") tableSort = { ...DEFAULT_TABLE_SORT[activeTab] };
        updateSortOptions();
        updateDedupeUi();
        renderPanel(activeTab);
      });
    });

    document.getElementById("viewGrid").addEventListener("click", () => setViewMode("grid"));
    document.getElementById("viewTable").addEventListener("click", () => setViewMode("table"));
    document.getElementById("libGrouped").addEventListener("click", () => setLibraryGrouped(true));
    document.getElementById("libDetailed").addEventListener("click", () => setLibraryGrouped(false));
    document.getElementById("dedupeBtn").addEventListener("click", runDedupe);
    document.getElementById("searchInput").addEventListener("input", renderAll);
    document.getElementById("sortSelect").addEventListener("change", renderAll);

    async function init() {
      ["Searches", "Library", "Likes"].forEach((name) => {
        document.getElementById(`grid${name}`).innerHTML = loadingHtml();
        document.getElementById(`table${name}`).innerHTML = loadingHtml();
      });

      const [ytMeta, libIndex, likesRaw, playedRaw, disk] = await Promise.all([
        loadCacheJson("youtube_metadata.json"),
        loadCacheJson("library_index.json"),
        loadCacheJson("likes.json"),
        loadCacheJson("played_ids.json"),
        loadDiskUsage(),
      ]);

      if (!cacheDir) {
        showBanner("sin caché — docker compose up -d explorer", "error");
        ["Searches", "Library", "Likes"].forEach((name) => {
          document.getElementById(`grid${name}`).innerHTML = emptyHtml("sin datos disponibles.");
          document.getElementById(`table${name}`).innerHTML = "";
        });
        setCacheBadge();
        return;
      }

      diskUsage = disk;
      setCacheBadge();
      searches = transformSearches(ytMeta);
      library = transformLibrary(libIndex);
      likes = transformLikes(likesRaw);
      playedCount = countPlayedIds(playedRaw);

      await loadDedupePreview();
      updateStats();
      renderAll();

      if (searches.length === 0 && library.length === 0 && likes.length === 0) {
        showBanner("caché vacía — usa !play en discord", "info");
      }
    }

    init();
  </script>
</body>
</html>
