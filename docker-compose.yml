services:
  bot:
    build: .
    restart: unless-stopped
    ports:
      - "8888:8888"
    volumes:
      # Persist the Spotify OAuth token between restarts
      - ./spotify_cache:/app/.cache
    environment:
      # Required — set these in your CI/CD secrets or shell environment before running
      BOT_TOKEN: ${BOT_TOKEN}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI:-http://localhost:8888/callback}
      # Optional
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      NORMALIZE_AUDIO: ${NORMALIZE_AUDIO:-true}
      SPOTIFY_CACHE_PATH: /app/.cache/spotify.cache
