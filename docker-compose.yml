services:
  bot:
    build: .
    restart: unless-stopped
    ports:
      - "8888:8888"
    volumes:
      # .env is read by the app itself (load_dotenv_values), not by Docker
      - ./.env:/app/.env:ro
      # Persist the Spotify OAuth token between restarts
      - ./spotify_cache:/app/.cache
      # YouTube cookies file (export from browser via "Get cookies.txt LOCALLY" extension)
      # Not read-only: yt-dlp rewrites cookies file to persist refreshed session tokens
      - ./cookies.txt:/app/cookies.txt
    environment:
      SPOTIFY_CACHE_PATH: /app/.cache/spotify.cache
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      NORMALIZE_AUDIO: true
      YTDL_COOKIES_FILE: /app/cookies.txt
      YTDL_COOKIES_PREFERENCE: file
      YTDL_SEARCH_CONCURRENCY: 1
      YTDL_SEARCH_DELAY_SEC: 7.0
      YTDL_SEARCH_DELAY_URGENT_SEC: 0.5
      YTDL_SEARCH_JITTER_SEC: 3.0
      LIBRARY_ENABLED: "true"
      LIBRARY_PATH: /app/.cache/library

  explorer:
    build: .
    restart: unless-stopped
    working_dir: /app
    ports:
      - "8080:8080"
    volumes:
      - ./web:/app/web:ro
      - ./spotify_cache:/app/.cache
      - ./.env:/app/.env:ro
    command: python3 web/server.py
    environment:
      EXPLORER_PORT: "8080"
      EXPLORER_HOST: "0.0.0.0"
